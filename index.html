<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Check Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f0f12; --bg-card: #18181f; --bg-hover: #1f1f28; --border: #2a2a35; --text: #e5e5ea; --text-dim: #8888a0; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6; --purple: #a855f7; --orange: #f97316; --cyan: #06b6d4; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
        .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
        .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }
        .badge-cyan { background: rgba(6,182,212,0.15); color: var(--cyan); }
        input, select, textarea { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 13px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; font-size: 13px; transition: all 0.15s; }
        .btn-primary { background: var(--blue); color: white; padding: 8px 16px; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: var(--green); color: white; padding: 8px 16px; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--red); color: white; padding: 8px 16px; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; }
        .btn-small { padding: 4px 10px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: var(--bg-hover); }
        tr.selected { background: rgba(59,130,246,0.1); }
        .tab { padding: 10px 20px; border-bottom: 2px solid transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: 500; }
        .tab.active { border-bottom-color: var(--blue); color: var(--text); }
        .tab:hover { color: var(--text); }
        .stat-card { text-align: center; padding: 20px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }
        .settings-input { width: 100px; padding: 6px 10px; font-size: 13px; text-align: right; }
        .toggle { position: relative; width: 40px; height: 22px; background: var(--bg-hover); border-radius: 11px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
        .toggle.active { background: var(--blue); border-color: var(--blue); }
        .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
        .toggle.active::after { transform: translateX(18px); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const CONFIG = { SUPABASE_URL: localStorage.getItem('supabase_url') || '', SUPABASE_KEY: localStorage.getItem('supabase_key') || '' };
        const EXPORT_COOLDOWN_DAYS = 30;

        const supabase = {
            async query(table, options = {}) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return [];
                const baseParams = new URLSearchParams();
                if (options.select) baseParams.append('select', options.select);
                if (options.order) baseParams.append('order', options.order);
                if (options.filters) options.filters.forEach(f => baseParams.append(f.col, f.val));
                if (options.limit) {
                    baseParams.append('limit', options.limit);
                    const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}?${baseParams}`;
                    const res = await fetch(url, { headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` } });
                    return res.ok ? res.json() : [];
                }
                let allData = [];
                let offset = 0;
                const pageSize = 1000;
                while (true) {
                    const params = new URLSearchParams(baseParams);
                    params.append('limit', pageSize);
                    params.append('offset', offset);
                    const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}?${params}`;
                    const res = await fetch(url, { headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` } });
                    if (!res.ok) break;
                    const data = await res.json();
                    if (!data || data.length === 0) break;
                    allData = allData.concat(data);
                    if (data.length < pageSize) break;
                    offset += pageSize;
                }
                return allData;
            },
            async insert(table, data) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return null;
                const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST', headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(Array.isArray(data) ? data : [data])
                });
                return res.ok ? res.json() : null;
            },
            async update(table, id, data) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return null;
                const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH', headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(data)
                });
                return res.ok ? res.json() : null;
            }
        };

        const fmt = (val) => val != null ? `$${Number(val).toFixed(2)}` : '—';
        const exportDateTag = () => { const d = new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; };
        
        const isRecentlyExported = (exportedAt) => {
            if (!exportedAt) return false;
            const exportDate = new Date(exportedAt);
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - EXPORT_COOLDOWN_DAYS);
            return exportDate > cutoff;
        };

        const KeepaDataDisplay = ({ data }) => {
            if (!data) return <span style={{color:'var(--text-dim)'}}>No Keepa data available</span>;
            const priceFields = [
                { key: 'current_used', label: 'Current Used' }, { key: 'current_new', label: 'Current New' },
                { key: 'current_amazon', label: 'Amazon Price' }, { key: 'current_ebay_used', label: 'eBay Used' },
                { key: 'avg_used_180', label: 'Avg Used (180d)' }, { key: 'avg_used_90', label: 'Avg Used (90d)' },
                { key: 'lowest_used', label: 'Lowest Used' }, { key: 'lowest_new', label: 'Lowest New' },
            ];
            const otherFields = [
                { key: 'sales_rank', label: 'Sales Rank', format: v => v?.toLocaleString() },
                { key: 'avg_sales_rank', label: 'Avg Rank', format: v => v?.toLocaleString() },
                { key: 'offer_count_used', label: 'Used Offers' }, { key: 'offer_count_new', label: 'New Offers' },
                { key: 'oos_90_used', label: 'OOS % (90d)', format: v => v != null ? `${v}%` : null },
            ];
            return (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                    <div>
                        <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8,textTransform:'uppercase'}}>Price Data</div>
                        <table style={{width:'100%',fontSize:12}}>
                            <tbody>
                                {priceFields.map(f => (
                                    <tr key={f.key}>
                                        <td style={{padding:'4px 8px 4px 0',color:'var(--text-dim)'}}>{f.label}</td>
                                        <td className="mono" style={{padding:'4px 0',color: data[f.key] ? 'var(--green)' : 'var(--text-dim)'}}>
                                            {data[f.key] ? `$${Number(data[f.key]).toFixed(2)}` : '—'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8,textTransform:'uppercase'}}>Other Data</div>
                        <table style={{width:'100%',fontSize:12}}>
                            <tbody>
                                {otherFields.map(f => (
                                    <tr key={f.key}>
                                        <td style={{padding:'4px 8px 4px 0',color:'var(--text-dim)'}}>{f.label}</td>
                                        <td className="mono" style={{padding:'4px 0', color: f.key === 'oos_90_used' && data[f.key] >= 50 ? 'var(--orange)' : undefined}}>
                                            {data[f.key] != null ? (f.format ? f.format(data[f.key]) : data[f.key]) : '—'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        function ConnectionModal({ isOpen, onClose }) {
            const [url, setUrl] = useState(CONFIG.SUPABASE_URL);
            const [key, setKey] = useState(CONFIG.SUPABASE_KEY);
            const save = () => { localStorage.setItem('supabase_url', url); localStorage.setItem('supabase_key', key); CONFIG.SUPABASE_URL = url; CONFIG.SUPABASE_KEY = key; onClose(); window.location.reload(); };
            if (!isOpen) return null;
            return (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
                    <div className="card" style={{padding:24,width:450}}>
                        <h3 style={{margin:'0 0 20px',fontSize:18}}>🔌 Database Connection</h3>
                        <div style={{marginBottom:16}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Supabase URL</label><input style={{width:'100%'}} value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxx.supabase.co" /></div>
                        <div style={{marginBottom:20}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Supabase Anon Key</label><input style={{width:'100%'}} type="password" value={key} onChange={e => setKey(e.target.value)} placeholder="eyJ..." /></div>
                        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn-secondary" onClick={onClose}>Cancel</button><button className="btn-primary" onClick={save}>Save & Reload</button></div>
                    </div>
                </div>
            );
        }

        function StatsRow({ stats }) {
            return (
                <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12,marginBottom:24}}>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--orange)'}}>{stats.fringe || 0}</div><div className="stat-label">Fringe</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--cyan)'}}>{stats.highPriceKeepa || 0}</div><div className="stat-label">High Price Keepa</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--green)'}}>{stats.hasSuggested || 0}</div><div className="stat-label">Has Suggested</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--blue)'}}>{stats.readyToExport || 0}</div><div className="stat-label">Ready to Export</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--purple)'}}>{stats.supervisorQueue || 0}</div><div className="stat-label">Supervisor</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--text-dim)'}}>{stats.recentlyExported || 0}</div><div className="stat-label">Recently Exported</div></div>
                </div>
            );
        }

        function PricingTable({ cases, tabType, filter, onFilterChange, onApprove, onFlag, onRefresh, settings, hideRecent, onToggleHideRecent }) {
            const [editedPrices, setEditedPrices] = useState({});
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [page, setPage] = useState(0);
            const [selectedKeepa, setSelectedKeepa] = useState(null);
            const pageSize = 50;
            
            const reasonLabels = { 
                'ultrapricer_fallback': '⚠️ $100/$500 Fallback', 
                'high_price_keepa': '💰 High Price >$70',
            };
            
            const filteredCases = useMemo(() => {
                let result = cases;
                if (tabType === 'fringe') {
                    result = result.filter(c => c.flag_reason === 'ultrapricer_fallback');
                } else if (tabType === 'high_price_keepa') {
                    result = result.filter(c => c.flag_reason === 'high_price_keepa');
                }
                if (hideRecent) {
                    result = result.filter(c => !isRecentlyExported(c.exported_at));
                }
                switch (filter) {
                    case 'has_suggested': return result.filter(c => c.suggested_price != null && !c.ready_to_export);
                    case 'needs_keepa': return result.filter(c => c.suggested_price == null);
                    case 'ready_to_export': return result.filter(c => c.ready_to_export);
                    case 'recently_exported': return cases.filter(c => 
                        (tabType === 'fringe' ? c.flag_reason === 'ultrapricer_fallback' : c.flag_reason === 'high_price_keepa') && 
                        isRecentlyExported(c.exported_at)
                    );
                    default: return result;
                }
            }, [cases, tabType, filter, hideRecent]);
            
            const totalPages = Math.ceil(filteredCases.length / pageSize);
            const pagedCases = filteredCases.slice(page * pageSize, (page + 1) * pageSize);
            
            const tabCases = useMemo(() => {
                let result = cases;
                if (tabType === 'fringe') result = result.filter(c => c.flag_reason === 'ultrapricer_fallback');
                else if (tabType === 'high_price_keepa') result = result.filter(c => c.flag_reason === 'high_price_keepa');
                if (hideRecent) result = result.filter(c => !isRecentlyExported(c.exported_at));
                return result;
            }, [cases, tabType, hideRecent]);
            
            const counts = useMemo(() => ({ 
                all: tabCases.length, 
                has_suggested: tabCases.filter(c => c.suggested_price != null && !c.ready_to_export).length, 
                needs_keepa: tabCases.filter(c => c.suggested_price == null).length, 
                ready_to_export: tabCases.filter(c => c.ready_to_export).length,
                recently_exported: cases.filter(c => 
                    (tabType === 'fringe' ? c.flag_reason === 'ultrapricer_fallback' : c.flag_reason === 'high_price_keepa') && 
                    isRecentlyExported(c.exported_at)
                ).length
            }), [tabCases, cases, tabType]);
            
            const getNewPrice = (c) => {
                if (editedPrices[c.asin] !== undefined && editedPrices[c.asin] !== '') return parseFloat(editedPrices[c.asin]) || 0;
                return c.suggested_price || c.floor_price || 0;
            };
            
            const isPriceBelowFloor = (c) => {
                const price = getNewPrice(c);
                return c.floor_price && price < c.floor_price;
            };
            
            const handleApprove = (c) => {
                const price = getNewPrice(c);
                if (c.floor_price && price < c.floor_price) { alert(`Price $${price.toFixed(2)} is below floor $${c.floor_price.toFixed(2)}`); return; }
                onApprove(c.id, price, '', true);
            };
            
            const toggleSelect = (id) => { const newSet = new Set(selectedIds); if (newSet.has(id)) newSet.delete(id); else newSet.add(id); setSelectedIds(newSet); };
            const toggleSelectAll = () => { if (selectedIds.size === pagedCases.length) setSelectedIds(new Set()); else setSelectedIds(new Set(pagedCases.map(c => c.id))); };
            
            const handleBatchApprove = async () => {
                const itemsToApprove = pagedCases.filter(c => selectedIds.has(c.id) && (c.suggested_price || editedPrices[c.asin]));
                if (itemsToApprove.length === 0) { alert('No items selected with prices'); return; }
                const belowFloor = itemsToApprove.filter(c => isPriceBelowFloor(c));
                if (belowFloor.length > 0) { alert(`${belowFloor.length} item(s) have prices below floor.`); return; }
                for (const c of itemsToApprove) { await onApprove(c.id, getNewPrice(c), '', true); }
                setSelectedIds(new Set()); setEditedPrices({});
            };
            
            useEffect(() => { setPage(0); setSelectedIds(new Set()); }, [filter, tabType]);
            
            const loadKeepaData = async (c) => {
                const snapshot = await supabase.query('price_snapshots', { filters: [{ col: 'asin', val: `eq.${c.asin}` }], order: 'snapshot_date.desc', limit: 1 });
                const keepaData = snapshot?.[0] ? {
                    current_used: snapshot[0].amazon_used_price, current_new: snapshot[0].amazon_new_price,
                    avg_used_180: snapshot[0].amazon_180day_avg_price, avg_used_90: snapshot[0].amazon_90day_avg_price,
                    sales_rank: snapshot[0].amazon_sales_rank, avg_sales_rank: snapshot[0].amazon_avg_sales_rank,
                    offer_count_used: snapshot[0].amazon_offer_count_used, offer_count_new: snapshot[0].amazon_offer_count_new,
                    lowest_used: snapshot[0].amazon_lowest_used, lowest_new: snapshot[0].amazon_lowest_new,
                    oos_90_used: snapshot[0].amazon_oos_90_used
                } : null;
                setSelectedKeepa({ asin: c.asin, title: c.inventory?.title, keepa_data: keepaData, floor_price: c.floor_price, suggested_price: c.suggested_price });
            };
            
            return (
                <div className="card" style={{overflow:'hidden'}}>
                    <div style={{padding:16,borderBottom:'1px solid var(--border)',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                        <select value={filter} onChange={e => onFilterChange(e.target.value)} style={{minWidth:220}}>
                            <option value="all">All ({counts.all})</option>
                            <option value="has_suggested">✓ Has Suggested ({counts.has_suggested})</option>
                            <option value="needs_keepa">✗ Needs Keepa ({counts.needs_keepa})</option>
                            <option value="ready_to_export">🚀 Ready to Export ({counts.ready_to_export})</option>
                            <option value="recently_exported">📦 Recently Exported ({counts.recently_exported})</option>
                        </select>
                        
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontSize:12,color:'var(--text-dim)'}}>Hide exported (30d)</span>
                            <div className={`toggle ${hideRecent ? 'active' : ''}`} onClick={onToggleHideRecent}></div>
                        </div>
                        
                        <span style={{fontSize:13,color:'var(--text-dim)'}}>{selectedIds.size} selected</span>
                        
                        <button className="btn-success btn-small" onClick={handleBatchApprove} disabled={selectedIds.size === 0} style={{opacity: selectedIds.size === 0 ? 0.5 : 1}}>
                            ✓ Approve ({selectedIds.size})
                        </button>
                        
                        <div style={{flex:1}}></div>
                        
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <button className="btn-secondary btn-small" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>←</button>
                            <span style={{fontSize:12,color:'var(--text-dim)'}}>Page {page + 1} of {totalPages || 1}</span>
                            <button className="btn-secondary btn-small" onClick={() => setPage(p => Math.min(totalPages - 1, p+1))} disabled={page >= totalPages - 1}>→</button>
                        </div>
                        
                        <button className="btn-secondary" onClick={onRefresh}>↻ Refresh</button>
                    </div>
                    <div style={{overflowX:'auto',maxHeight:'60vh',overflowY:'auto'}}>
                        <table>
                            <thead style={{position:'sticky',top:0,background:'var(--bg-card)',zIndex:1}}>
                                <tr>
                                    <th style={{width:40}}><input type="checkbox" className="checkbox" checked={selectedIds.size === pagedCases.length && pagedCases.length > 0} onChange={toggleSelectAll} /></th>
                                    <th>ASIN</th><th>Title</th><th>Type</th><th>Current</th><th>Floor</th><th>Suggested</th><th style={{width:100}}>New Price</th><th style={{width:80}}>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {pagedCases.map(c => {
                                    const hasEdited = editedPrices[c.asin] !== undefined && editedPrices[c.asin] !== '';
                                    const isSelected = selectedIds.has(c.id);
                                    const belowFloor = isPriceBelowFloor(c);
                                    const wasExported = isRecentlyExported(c.exported_at);
                                    return (
                                        <tr key={c.id} className={isSelected ? 'selected' : ''} style={{opacity: wasExported ? 0.6 : 1}}>
                                            <td><input type="checkbox" className="checkbox" checked={isSelected} onChange={() => toggleSelect(c.id)} /></td>
                                            <td className="mono" style={{fontSize:11}}>
                                                <a href={`http://lkdev.com/a.php?a=${c.asin}`} target="_blank" rel="noopener noreferrer" style={{color:'var(--blue)',textDecoration:'none'}}>{c.asin}</a>
                                            </td>
                                            <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{c.inventory?.title || '—'}</td>
                                            <td>
                                                <span className={`badge ${c.flag_reason === 'ultrapricer_fallback' ? 'badge-orange' : 'badge-cyan'}`}>
                                                    {reasonLabels[c.flag_reason] || c.flag_reason}
                                                </span>
                                                {wasExported && <span className="badge badge-blue" style={{marginLeft:4}}>Exported</span>}
                                            </td>
                                            <td className="mono" style={{fontSize:12,color:'var(--orange)'}}>{fmt(c.inventory?.current_list_price)}</td>
                                            <td className="mono" style={{fontSize:12,color:'var(--yellow)'}}>{fmt(c.floor_price)}</td>
                                            <td>
                                                {c.suggested_price ? (
                                                    <span className="mono" style={{fontSize:12,color:'var(--green)',cursor:'pointer',textDecoration:'underline'}} onClick={() => loadKeepaData(c)} title="Click to view Keepa data">
                                                        {fmt(c.suggested_price)}
                                                    </span>
                                                ) : <span className="mono" style={{fontSize:12,color:'var(--text-dim)'}}>—</span>}
                                            </td>
                                            <td>
                                                <input type="number" step="0.01" className="mono"
                                                    style={{ width:'80px', padding:'4px 8px', fontSize:12, textAlign:'right',
                                                        background: belowFloor ? 'rgba(239,68,68,0.1)' : hasEdited ? 'var(--bg-dark)' : 'var(--bg-hover)',

        function SettingsTab({ settings, onSave }) {
            const [localSettings, setLocalSettings] = useState(settings);
            const [saving, setSaving] = useState(false);

            const parseShippingCsv = (csv) => { const lines = csv.trim().split('\n'); const brackets = []; for (const line of lines) { const parts = line.split(','); if (parts.length >= 2) { const max_weight = parseFloat(parts[0].trim()); const cost = parseFloat(parts[1].trim().replace('$', '')); if (!isNaN(max_weight) && !isNaN(cost)) brackets.push({ max_weight, cost }); } } return brackets.sort((a, b) => a.max_weight - b.max_weight); };
            const handleSave = async () => { setSaving(true); try { await onSave({ ...localSettings, shipping_brackets: parseShippingCsv(shippingCsv) }); setMessage('✓ Saved!'); setTimeout(() => setMessage(''), 3000); } catch { setMessage('✗ Error'); } setSaving(false); };

            const [hideRecentFringe, setHideRecentFringe] = useState(true);
            const [hideRecentHighPrice, setHideRecentHighPrice] = useState(true);
            const [showConnection, setShowConnection] = useState(!CONFIG.SUPABASE_URL);
            const [showFlagModal, setShowFlagModal] = useState(false);
            const [flagAsin, setFlagAsin] = useState(null);
            const [loading, setLoading] = useState(true);
            const [fringeCases, setFringeCases] = useState([]);
            const [reviews, setReviews] = useState([]);
            const [settings, setSettings] = useState({ shipping_brackets: [], min_profit: 2.50, amazon_referral_fee: 0.15, amazon_fixed_fee: 1.80 });
            const [stats, setStats] = useState({});

            const loadData = useCallback(async () => {
                if (!CONFIG.SUPABASE_URL) return;
                setLoading(true);
                try {
                    const settingsData = await supabase.query('dashboard_settings', { limit: 1 });
                    if (settingsData.length > 0) setSettings(settingsData[0]);
                    const cases = await supabase.query('fringe_cases', { select: '*, inventory(title, current_list_price, asin)', order: 'created_at.desc', filters: [{ col: 'status', val: 'eq.pending' }] });
                    const snapshots = await supabase.query('price_snapshots', { select: '*', order: 'snapshot_date.desc' });
                    const snapshotMap = {}; snapshots.forEach(s => { if (!snapshotMap[s.asin]) snapshotMap[s.asin] = s; });
                    const enrichedCases = cases.map(c => { const snapshot = snapshotMap[c.asin] || {}; const { id: snapshotId, ...snapshotData } = snapshot; return { ...snapshotData, ...c }; });
                    const reviewsData = await supabase.query('manual_reviews', { order: 'created_at.desc' });
                    setFringeCases(enrichedCases);
                    setReviews(reviewsData);
                    
                    const fringeItems = enrichedCases.filter(c => c.flag_reason === 'ultrapricer_fallback' && !isRecentlyExported(c.exported_at));
                    const highPriceKeepaItems = enrichedCases.filter(c => c.flag_reason === 'high_price_keepa' && !isRecentlyExported(c.exported_at));
                    const allKeepaItems = [...fringeItems, ...highPriceKeepaItems];
                    const recentlyExportedItems = enrichedCases.filter(c => isRecentlyExported(c.exported_at));
                    
                    setStats({ 
                        fringe: fringeItems.length,
                        highPriceKeepa: highPriceKeepaItems.length,
                        hasSuggested: allKeepaItems.filter(c => c.suggested_price != null && !c.ready_to_export).length, 
                        readyToExport: allKeepaItems.filter(c => c.ready_to_export).length, 
                        supervisorQueue: reviewsData.filter(r => r.status === 'pending').length, 
                        recentlyExported: recentlyExportedItems.length
                    });
                } catch (err) { console.error('Error:', err); }
                setLoading(false);
            }, []);

            useEffect(() => { loadData(); }, [loadData]);

            const handleSaveSettings = async (newSettings) => { await supabase.update('dashboard_settings', newSettings.id, { shipping_brackets: newSettings.shipping_brackets, min_profit: newSettings.min_profit, amazon_referral_fee: newSettings.amazon_referral_fee, amazon_fixed_fee: newSettings.amazon_fixed_fee, updated_at: new Date().toISOString() }); setSettings(newSettings); };
            const handleApprovePrice = async (id, price, notes, readyToExport) => { await supabase.update('fringe_cases', id, { approved_price: price, approval_notes: notes, ready_to_export: readyToExport, approved_at: new Date().toISOString() }); loadData(); };
            
            const handleExport = async (items) => {
                try {
                    const [exportRecord] = await supabase.insert('price_exports', { item_count: items.length, exported_by: 'dashboard' });
                    if (!exportRecord) { alert('Failed to create export'); return; }
                    await supabase.insert('price_export_items', items.map(item => ({ export_id: exportRecord.id, asin: item.asin, old_price: item.old_price, new_price: item.new_price, source: 'fringe_review' })));
                    for (const item of items) { await supabase.update('fringe_cases', item.id, { status: 'resolved', resolved_at: new Date().toISOString(), exported_at: new Date().toISOString(), resolution_notes: `Exported @ $${item.new_price}` }); }
                    const dateTag = exportDateTag();
                    const csvLines = ['ASIN,MIN,MAX,TAGS']; items.forEach(item => { csvLines.push(`="${item.asin}",,${item.new_price.toFixed(2)},${dateTag}`); });
                    const blob = new Blob([csvLines.join('\n')], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `price_export_${dateTag}.csv`; a.click(); URL.revokeObjectURL(url);
                    loadData();
                } catch (err) { console.error('Export error:', err); alert('Export failed: ' + err.message); }
            };
            
            const handleFlagForReview = async (data) => { await supabase.insert('manual_reviews', { asin: data.asin, reason: data.reason, details: data.details, flagged_by: data.flagged_by, status: 'pending' }); loadData(); };
            const handleResolveReview = async (id, status, notes, reviewedBy, exportPrice) => {
                await supabase.update('manual_reviews', id, { status, review_notes: notes, reviewed_by: reviewedBy, reviewed_at: new Date().toISOString() });
                if (exportPrice && status === 'reviewed') {
                    const review = reviews.find(r => r.id === id);
                    if (review) {
                        const existingCases = await supabase.query('fringe_cases', { filters: [{ col: 'asin', val: `eq.${review.asin}` }] });
                        if (existingCases.length > 0) await supabase.update('fringe_cases', existingCases[0].id, { approved_price: exportPrice, ready_to_export: true, approved_at: new Date().toISOString(), approval_notes: notes });
                    }
                }
                loadData();
            };
            const openFlagModal = (asin) => { setFlagAsin(asin); setShowFlagModal(true); };

            return (
                <div style={{minHeight:'100vh'}}>
                    <header style={{background:'var(--bg-card)',borderBottom:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div style={{display:'flex',alignItems:'center',gap:12}}><span style={{fontSize:22}}>📊</span><h1 style={{margin:0,fontSize:18,fontWeight:600}}>Pricing Dashboard</h1></div>
                        <div style={{display:'flex',gap:10}}><button className="btn-secondary btn-small" onClick={loadData}>↻ Refresh</button><button className="btn-secondary btn-small" onClick={() => setShowConnection(true)}>🔌</button></div>
                    </header>
                    <main style={{padding:24,maxWidth:1400,margin:'0 auto'}}>
                        {!CONFIG.SUPABASE_URL ? (
                            <div className="card" style={{padding:40,textAlign:'center'}}><h2 style={{marginBottom:12}}>Welcome</h2><p style={{color:'var(--text-dim)',marginBottom:20}}>Connect your database to get started.</p><button className="btn-primary" onClick={() => setShowConnection(true)}>Configure</button></div>
                        ) : (
                            <>
                                <StatsRow stats={stats} />
                                <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:20,flexWrap:'wrap'}}>
                                    <div className={`tab ${tab === 'fringe' ? 'active' : ''}`} onClick={() => setTab('fringe')}>⚠️ Fringe</div>
                                    <div className={`tab ${tab === 'high_price_keepa' ? 'active' : ''}`} onClick={() => setTab('high_price_keepa')}>💰 High Price Keepa</div>
                                    <div className={`tab ${tab === 'high_rank' ? 'active' : ''}`} onClick={() => setTab('high_rank')}>📈 High Rank</div>
                                    <div className={`tab ${tab === 'high_price' ? 'active' : ''}`} onClick={() => setTab('high_price')}>💵 High Price</div>
                                    <div className={`tab ${tab === 'export' ? 'active' : ''}`} onClick={() => setTab('export')}>🚀 Export{stats.readyToExport > 0 && <span className="badge badge-green" style={{marginLeft:8}}>{stats.readyToExport}</span>}</div>
                                    <div className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>📦 History</div>
                                    <div className={`tab ${tab === 'supervisor' ? 'active' : ''}`} onClick={() => setTab('supervisor')}>👔 Supervisor{stats.supervisorQueue > 0 && <span className="badge badge-purple" style={{marginLeft:8}}>{stats.supervisorQueue}</span>}</div>
                                    <div className={`tab ${tab === 'logic' ? 'active' : ''}`} onClick={() => setTab('logic')}>📖 Logic</div>
                                    <div className={`tab ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>⚙️ Settings</div>
                                </div>
                                {loading ? <div style={{textAlign:'center',padding:60,color:'var(--text-dim)'}}>Loading...</div> : (
                                    <>
                                        {tab === 'fringe' && <PricingTable cases={fringeCases} tabType="fringe" filter={fringeFilter} onFilterChange={setFringeFilter} onApprove={handleApprovePrice} onFlag={openFlagModal} onRefresh={loadData} settings={settings} hideRecent={hideRecentFringe} onToggleHideRecent={() => setHideRecentFringe(!hideRecentFringe)} />}
                                        {tab === 'high_price_keepa' && <PricingTable cases={fringeCases} tabType="high_price_keepa" filter={highPriceFilter} onFilterChange={setHighPriceFilter} onApprove={handleApprovePrice} onFlag={openFlagModal} onRefresh={loadData} settings={settings} hideRecent={hideRecentHighPrice} onToggleHideRecent={() => setHideRecentHighPrice(!hideRecentHighPrice)} />}
                                        {tab === 'high_rank' && <AgingReviewTab reviewType="high_rank" settings={settings} onRefresh={loadData} />}
                                        {tab === 'high_price' && <AgingReviewTab reviewType="high_price" settings={settings} onRefresh={loadData} />}
                                        {tab === 'export' && <ExportTab cases={fringeCases} onExport={handleExport} onRefresh={loadData} />}
                                        {tab === 'history' && <ExportHistoryTab onRefresh={loadData} />}
                                        {tab === 'supervisor' && <SupervisorReviewTab reviews={reviews} onResolve={handleResolveReview} onRefresh={loadData} settings={settings} />}
                                        {tab === 'logic' && <PricingLogicTab settings={settings} />}
                                        {tab === 'settings' && <SettingsTab settings={settings} onSave={handleSaveSettings} />}
                                    </>
                                )}
                            </>
                        )}
                    </main>
                    <ConnectionModal isOpen={showConnection} onClose={() => setShowConnection(false)} />
                    <FlagForReviewModal isOpen={showFlagModal} onClose={() => setShowFlagModal(false)} asin={flagAsin} onSubmit={handleFlagForReview} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
