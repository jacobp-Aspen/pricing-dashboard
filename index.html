<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Check Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f0f12; --bg-card: #18181f; --bg-hover: #1f1f28; --border: #2a2a35; --text: #e5e5ea; --text-dim: #8888a0; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6; --purple: #a855f7; --orange: #f97316; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
        .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
        .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }
        input, select, textarea { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 13px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; font-size: 13px; transition: all 0.15s; }
        .btn-primary { background: var(--blue); color: white; padding: 8px 16px; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: var(--green); color: white; padding: 8px 16px; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--red); color: white; padding: 8px 16px; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; }
        .btn-small { padding: 4px 10px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: var(--bg-hover); }
        tr.selected { background: rgba(59,130,246,0.1); }
        .tab { padding: 10px 20px; border-bottom: 2px solid transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: 500; }
        .tab.active { border-bottom-color: var(--blue); color: var(--text); }
        .tab:hover { color: var(--text); }
        .stat-card { text-align: center; padding: 20px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }
        .settings-input { width: 100px; padding: 6px 10px; font-size: 13px; text-align: right; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const CONFIG = { SUPABASE_URL: localStorage.getItem('supabase_url') || '', SUPABASE_KEY: localStorage.getItem('supabase_key') || '' };

        const supabase = {
            async query(table, options = {}) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return [];
                
                const baseParams = new URLSearchParams();
                if (options.select) baseParams.append('select', options.select);
                if (options.order) baseParams.append('order', options.order);
                if (options.filters) options.filters.forEach(f => baseParams.append(f.col, f.val));
                
                // If a specific limit is requested, use single fetch
                if (options.limit) {
                    baseParams.append('limit', options.limit);
                    const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}?${baseParams}`;
                    const res = await fetch(url, { headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` } });
                    return res.ok ? res.json() : [];
                }
                
                // Otherwise, paginate to get all records
                let allData = [];
                let offset = 0;
                const pageSize = 1000;
                
                while (true) {
                    const params = new URLSearchParams(baseParams);
                    params.append('limit', pageSize);
                    params.append('offset', offset);
                    
                    const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}?${params}`;
                    const res = await fetch(url, { headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` } });
                    
                    if (!res.ok) break;
                    
                    const data = await res.json();
                    if (!data || data.length === 0) break;
                    
                    allData = allData.concat(data);
                    
                    if (data.length < pageSize) break;
                    offset += pageSize;
                }
                
                return allData;
            },
            async insert(table, data) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return null;
                const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST', headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(data)
                });
                return res.ok ? res.json() : null;
            },
            async update(table, id, data) {
                if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return null;
                const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH', 
                    headers: { 
                        'apikey': CONFIG.SUPABASE_KEY, 
                        'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`, 
                        'Content-Type': 'application/json', 
                        'Prefer': 'return=representation' 
                    },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const err = await res.text();
                    console.error('Update error:', res.status, err);
                }
                return res.ok ? res.json() : null;
            }
        };

        const fmt = (price) => price == null ? '—' : `$${Number(price).toFixed(2)}`;
        const fmtDate = (d) => d ? new Date(d).toLocaleDateString() : '—';
        const exportDateTag = () => { const d = new Date(); return `MANUAL_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; };

        const KeepaDataDisplay = ({ data }) => {
            if (!data) return <span style={{color:'var(--text-dim)'}}>No Keepa data available</span>;
            const priceFields = [
                { key: 'current_used', label: 'Current Used' }, { key: 'current_new', label: 'Current New' },
                { key: 'current_amazon', label: 'Amazon Price' }, { key: 'current_ebay_used', label: 'eBay Used' },
                { key: 'avg_used_365', label: 'Avg Used (365d)' }, { key: 'avg_new_365', label: 'Avg New (365d)' },
                { key: 'lowest_used', label: 'Lowest Used (all-time)' }, { key: 'lowest_new', label: 'Lowest New' },
                { key: 'lowest_used_365', label: 'Lowest Used (365d)' }, { key: 'lowest_buy_box_used', label: 'Lowest Buy Box Used' },
            ];
            const otherFields = [
                { key: 'sales_rank', label: 'Sales Rank', format: v => v?.toLocaleString() },
                { key: 'avg_sales_rank', label: 'Avg Rank (365d)', format: v => v?.toLocaleString() },
                { key: 'offer_count_used', label: 'Used Offers' }, { key: 'offer_count_new', label: 'New Offers' },
                { key: 'oos_90_used', label: 'OOS % (90d)', format: v => v != null ? `${v}%` : null },
            ];
            return (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                    <div>
                        <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8,textTransform:'uppercase'}}>Price Data</div>
                        <table style={{width:'100%',fontSize:12}}>
                            <tbody>
                                {priceFields.map(f => (
                                    <tr key={f.key}>
                                        <td style={{padding:'4px 8px 4px 0',color:'var(--text-dim)'}}>{f.label}</td>
                                        <td className="mono" style={{padding:'4px 0',color: data[f.key] ? 'var(--green)' : 'var(--text-dim)'}}>
                                            {data[f.key] ? `$${Number(data[f.key]).toFixed(2)}` : '—'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8,textTransform:'uppercase'}}>Other Data</div>
                        <table style={{width:'100%',fontSize:12}}>
                            <tbody>
                                {otherFields.map(f => (
                                    <tr key={f.key}>
                                        <td style={{padding:'4px 8px 4px 0',color:'var(--text-dim)'}}>{f.label}</td>
                                        <td className="mono" style={{padding:'4px 0', color: f.key === 'oos_90_used' && data[f.key] >= 50 ? 'var(--orange)' : undefined}}>
                                            {data[f.key] != null ? (f.format ? f.format(data[f.key]) : data[f.key]) : '—'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {data.title && <div style={{marginTop:12}}><div style={{fontSize:11,color:'var(--text-dim)'}}>Title</div><div style={{fontSize:12}}>{data.title}</div></div>}
                    </div>
                </div>
            );
        };

        function ConnectionModal({ isOpen, onClose }) {
            const [url, setUrl] = useState(CONFIG.SUPABASE_URL);
            const [key, setKey] = useState(CONFIG.SUPABASE_KEY);
            const save = () => { localStorage.setItem('supabase_url', url); localStorage.setItem('supabase_key', key); CONFIG.SUPABASE_URL = url; CONFIG.SUPABASE_KEY = key; onClose(); window.location.reload(); };
            if (!isOpen) return null;
            return (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
                    <div className="card" style={{padding:24,width:450}}>
                        <h3 style={{margin:'0 0 20px',fontSize:18}}>🔌 Database Connection</h3>
                        <div style={{marginBottom:16}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Supabase URL</label><input style={{width:'100%'}} value={url} onChange={e => setUrl(e.target.value)} placeholder="https://xxx.supabase.co" /></div>
                        <div style={{marginBottom:20}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Supabase Anon Key</label><input style={{width:'100%'}} type="password" value={key} onChange={e => setKey(e.target.value)} placeholder="eyJ..." /></div>
                        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn-secondary" onClick={onClose}>Cancel</button><button className="btn-primary" onClick={save}>Save & Reload</button></div>
                    </div>
                </div>
            );
        }

        function StatsRow({ stats }) {
            return (
                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:24}}>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--green)'}}>{stats.hasSuggested || 0}</div><div className="stat-label">Has Suggested</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--orange)'}}>{stats.needsKeepa || 0}</div><div className="stat-label">Needs Keepa</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--blue)'}}>{stats.readyToExport || 0}</div><div className="stat-label">Ready to Export</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--purple)'}}>{stats.supervisorQueue || 0}</div><div className="stat-label">Supervisor Queue</div></div>
                    <div className="card stat-card"><div className="stat-value" style={{color:'var(--text-dim)'}}>{stats.totalExported || 0}</div><div className="stat-label">Total Exported</div></div>
                </div>
            );
        }

        function ApprovePriceModal({ isOpen, item, onClose, onApprove }) {
            const [price, setPrice] = useState('');
            const [notes, setNotes] = useState('');
            useEffect(() => { if (item) { setPrice(item.suggested_price || item.floor_price || ''); setNotes(''); } }, [item]);
            if (!isOpen || !item) return null;
            const keepaData = { current_used: item.amazon_used_price, current_new: item.amazon_new_price, avg_used_365: item.amazon_90day_avg_price, sales_rank: item.amazon_sales_rank, avg_sales_rank: item.amazon_avg_sales_rank, offer_count_used: item.amazon_offer_count_used, offer_count_new: item.amazon_offer_count_new, lowest_used: item.amazon_lowest_used, lowest_new: item.amazon_lowest_new, lowest_used_365: item.amazon_lowest_used_365, lowest_buy_box_used: item.amazon_lowest_buy_box_used, oos_90_used: item.amazon_oos_90_used };
            return (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
                    <div className="card" style={{padding:24,width:600,maxHeight:'90vh',overflowY:'auto'}}>
                        <h3 style={{margin:'0 0 16px',fontSize:18}}>✅ Approve Price</h3>
                        <div style={{marginBottom:16,padding:12,background:'var(--bg-hover)',borderRadius:6}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                                <div><div style={{fontSize:12,color:'var(--text-dim)'}}>ASIN</div><div className="mono" style={{fontSize:14}}>{item.asin}</div></div>
                                <div><div style={{fontSize:12,color:'var(--text-dim)'}}>Current</div><div className="mono" style={{color:'var(--orange)'}}>{fmt(item.inventory?.current_list_price)}</div></div>
                                <div><div style={{fontSize:12,color:'var(--text-dim)'}}>Floor</div><div className="mono" style={{color:'var(--yellow)'}}>{fmt(item.floor_price)}</div></div>
                                <div><div style={{fontSize:12,color:'var(--text-dim)'}}>Suggested</div><div className="mono" style={{color:'var(--green)'}}>{fmt(item.suggested_price)}</div></div>
                            </div>
                            <div style={{fontSize:12}}>{item.inventory?.title || '—'}</div>
                        </div>
                        <div style={{marginBottom:16,padding:12,background:'var(--bg-hover)',borderRadius:6}}><div style={{fontSize:12,color:'var(--text-dim)',marginBottom:8}}>Keepa Data</div><KeepaDataDisplay data={keepaData} /></div>
                        <div style={{marginBottom:16}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Export Price ($)</label><input type="number" step="0.01" style={{width:'150px',fontSize:16}} className="mono" value={price} onChange={e => setPrice(e.target.value)} /></div>
                        <div style={{marginBottom:20}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Notes (optional)</label><textarea style={{width:'100%',height:60,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:6,padding:12,color:'var(--text)',fontSize:13,resize:'vertical'}} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional notes..." /></div>
                        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                            <button className="btn-secondary" onClick={onClose}>Cancel</button>
                            <button className="btn-primary" onClick={() => onApprove(item.id, parseFloat(price), notes, false)}>💾 Save & Review Later</button>
                            <button className="btn-success" onClick={() => onApprove(item.id, parseFloat(price), notes, true)}>✅ Ready to Export</button>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsTab({ settings, onSave }) {
            const [localSettings, setLocalSettings] = useState(settings);
            const [saving, setSaving] = useState(false);
            const [message, setMessage] = useState('');
            const [shippingCsv, setShippingCsv] = useState('');
            useEffect(() => { setLocalSettings(settings); if (settings.shipping_brackets?.length > 0) { setShippingCsv(settings.shipping_brackets.map(b => `${b.max_weight},${b.cost}`).join('\n')); } }, [settings]);
            const parseShippingCsv = (csv) => { const lines = csv.trim().split('\n'); const brackets = []; for (const line of lines) { const parts = line.split(','); if (parts.length >= 2) { const max_weight = parseFloat(parts[0].trim()); const cost = parseFloat(parts[1].trim().replace('$', '')); if (!isNaN(max_weight) && !isNaN(cost)) brackets.push({ max_weight, cost }); } } return brackets.sort((a, b) => a.max_weight - b.max_weight); };
            const handleCsvChange = (csv) => { setShippingCsv(csv); setLocalSettings({ ...localSettings, shipping_brackets: parseShippingCsv(csv) }); };
            const handleSave = async () => { setSaving(true); setMessage(''); try { const toSave = { ...localSettings, shipping_brackets: parseShippingCsv(shippingCsv) }; await onSave(toSave); setMessage('✓ Settings saved!'); setTimeout(() => setMessage(''), 3000); } catch (err) { setMessage('✗ Error saving'); } setSaving(false); };
            return (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
                    <div className="card" style={{padding:20}}>
                        <h3 style={{margin:'0 0 16px',fontSize:16}}>📦 Shipping Cost Brackets</h3>
                        <p style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Paste CSV: weight (lbs), cost ($)</p>
                        <textarea style={{width:'100%',height:300,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:6,padding:12,color:'var(--text)',fontFamily:'JetBrains Mono',fontSize:12,resize:'vertical'}} value={shippingCsv} onChange={e => handleCsvChange(e.target.value)} placeholder="1,2.64" />
                        <div style={{marginTop:8,fontSize:12,color:'var(--text-dim)'}}>{parseShippingCsv(shippingCsv).length} brackets parsed</div>
                    </div>
                    <div>
                        <div className="card" style={{padding:20,marginBottom:16}}>
                            <h3 style={{margin:'0 0 16px',fontSize:16}}>💰 Pricing Settings</h3>
                            <div style={{marginBottom:16}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Minimum Profit ($)</label><input type="number" step="0.25" className="settings-input mono" value={localSettings.min_profit || 2.50} onChange={e => setLocalSettings({...localSettings, min_profit: parseFloat(e.target.value) || 0})} /></div>
                            <div style={{marginBottom:16}}><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Amazon Referral Fee (%)</label><input type="number" step="0.01" className="settings-input mono" value={(localSettings.amazon_referral_fee || 0.15) * 100} onChange={e => setLocalSettings({...localSettings, amazon_referral_fee: (parseFloat(e.target.value) || 0) / 100})} /></div>
                            <div><label style={{display:'block',marginBottom:6,fontSize:12,color:'var(--text-dim)'}}>Amazon Fixed Fee ($)</label><input type="number" step="0.10" className="settings-input mono" value={localSettings.amazon_fixed_fee || 1.80} onChange={e => setLocalSettings({...localSettings, amazon_fixed_fee: parseFloat(e.target.value) || 0})} /></div>
                        </div>
                        <div style={{display:'flex',gap:12,alignItems:'center'}}><button className="btn-success" onClick={handleSave} disabled={saving}>{saving ? 'Saving...' : '💾 Save Settings'}</button>{message && <span style={{fontSize:13,color: message.startsWith('✓') ? 'var(--green)' : 'var(--red)'}}>{message}</span>}</div>
                    </div>
                </div>
            );
        }

        function FringeCasesTable({ cases, filter, onFilterChange, onApprove, onFlag, onRefresh, settings }) {
            const [editedPrices, setEditedPrices] = useState({});
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [page, setPage] = useState(0);
            const [selectedKeepa, setSelectedKeepa] = useState(null); // For Keepa popup
            const pageSize = 50;
            
            const filteredCases = useMemo(() => {
                switch (filter) {
                    case 'has_suggested': return cases.filter(c => c.suggested_price != null && !c.ready_to_export);
                    case 'needs_keepa': return cases.filter(c => c.suggested_price == null);
                    case 'ready_to_export': return cases.filter(c => c.ready_to_export);
                    default: return cases;
                }
            }, [cases, filter]);
            
            const totalPages = Math.ceil(filteredCases.length / pageSize);
            const pagedCases = filteredCases.slice(page * pageSize, (page + 1) * pageSize);
            
            const counts = useMemo(() => ({ all: cases.length, has_suggested: cases.filter(c => c.suggested_price != null && !c.ready_to_export).length, needs_keepa: cases.filter(c => c.suggested_price == null).length, ready_to_export: cases.filter(c => c.ready_to_export).length }), [cases]);
            const reasonLabels = { 'ultrapricer_fallback': '⚠️ Fallback', 'low_competition': 'Low Comp', 'no_keepa_data': 'No Keepa', 'high_variance': 'High Var' };
            
            const getNewPrice = (c) => {
                if (editedPrices[c.asin] !== undefined && editedPrices[c.asin] !== '') {
                    return parseFloat(editedPrices[c.asin]) || 0;
                }
                return c.suggested_price || c.floor_price || 0;
            };
            
            const isPriceBelowFloor = (c) => {
                const price = getNewPrice(c);
                return c.floor_price && price < c.floor_price;
            };
            
            const handleApprove = (c) => {
                const price = getNewPrice(c);
                if (c.floor_price && price < c.floor_price) {
                    alert(`Price $${price.toFixed(2)} is below floor $${c.floor_price.toFixed(2)}`);
                    return;
                }
                onApprove(c.id, price, '', true);
            };
            
            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedIds.size === pagedCases.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(pagedCases.map(c => c.id)));
                }
            };
            
            const handleBatchApprove = async () => {
                const itemsToApprove = pagedCases.filter(c => selectedIds.has(c.id) && (c.suggested_price || editedPrices[c.asin]));
                if (itemsToApprove.length === 0) {
                    alert('No items selected with prices');
                    return;
                }
                // Check for below-floor prices
                const belowFloor = itemsToApprove.filter(c => isPriceBelowFloor(c));
                if (belowFloor.length > 0) {
                    alert(`${belowFloor.length} item(s) have prices below floor. Please fix before approving.`);
                    return;
                }
                for (const c of itemsToApprove) {
                    const price = getNewPrice(c);
                    await onApprove(c.id, price, '', true);
                }
                setSelectedIds(new Set());
                setEditedPrices({});
            };
            
            // Reset page when filter changes
            useEffect(() => { setPage(0); setSelectedIds(new Set()); }, [filter]);
            
            // Load Keepa data for a fringe case
            const loadKeepaData = async (c) => {

            const [filter, setFilter] = useState('pending');

            const [reviewedBy, setReviewedBy] = useState('');
            const [exportPrice, setExportPrice] = useState('');
            const [floorPrice, setFloorPrice] = useState(0);
            const filteredReviews = useMemo(() => filter === 'all' ? reviews : reviews.filter(r => r.status === filter), [reviews, filter]);
            const pendingCount = reviews.filter(r => r.status === 'pending').length;
            const reviewedCount = reviews.filter(r => r.status === 'reviewed').length;
            
            const calculateFloor = useCallback(() => {
                const minProfit = settings?.min_profit || 2.50;
                const referralFee = settings?.amazon_referral_fee || 0.15;
                const fixedFee = settings?.amazon_fixed_fee || 1.80;
                const shippingCost = settings?.shipping_brackets?.[0]?.cost || 2.64;
                const minNet = fixedFee + shippingCost + minProfit;
                return Math.round((minNet / (1 - referralFee)) * 100) / 100;
            }, [settings]);
            
            useEffect(() => { 
                const floor = calculateFloor();
                setFloorPrice(floor);
                if (selectedReview?.keepa_data) { 
                    const kd = selectedReview.keepa_data; 
                    const suggestedPrice = Math.max(kd.lowest_used || kd.current_used || kd.avg_used_365 || floor, floor);
                    setExportPrice(suggestedPrice ? suggestedPrice.toFixed(2) : floor.toFixed(2)); 
                } else {
                    setExportPrice(floor.toFixed(2));
                }

            const isPriceBelowFloor = parseFloat(exportPrice) < floorPrice;
            
            const handleResolve = async (id, status, makeReadyToExport) => {

        function AgingReviewTab({ reviewType, settings, onRefresh }) {
            const [reviews, setReviews] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [editedPrices, setEditedPrices] = useState({});
            const [profitReduction, setProfitReduction] = useState(10);
            const [loading, setLoading] = useState(true);
            const [statusFilter, setStatusFilter] = useState('pending');
            const [filters, setFilters] = useState({ ageBucket: 'all', rankMin: '', rankMax: '', priceMin: '', priceMax: '' });
            
            const title = reviewType === 'high_rank' ? '📈 High Rank Items' : '💰 High Price Items';
            const description = reviewType === 'high_rank' 
                ? 'Items with rank > 1.8M, on shelf 20+ days' 
                : 'Items priced > $75, on shelf 45/70/100+ days';
            
            const ageBuckets = reviewType === 'high_rank' ? ['20+'] : ['45+', '70+', '100+'];
            
            // Status options based on review type
            const statusOptions = reviewType === 'high_rank' 
                ? [
                    { value: 'pending', label: 'Pending (20+ days)' },
                    { value: 'price_set_1', label: 'Price Set 1 (needs 50+ review)' },
                    { value: 'price_set_2', label: 'Price Set 2 (needs 80+ review)' },
                    { value: 'price_set_3', label: 'Price Set 3 (needs 100+ review)' },
                    { value: 'price_set_4', label: 'Price Set 4' },
                    { value: 'exported', label: 'Exported' }
                ]
                : [
                    { value: 'pending', label: 'Pending (45+ days)' },
                    { value: 'price_set_1', label: 'Price Set 1 (needs 70+ review)' },
                    { value: 'price_set_2', label: 'Price Set 2 (needs 100+ review)' },
                    { value: 'price_set_3', label: 'Price Set 3' },
                    { value: 'exported', label: 'Exported' }
                ];
            
            // Determine next status based on current status and review type
            const getNextStatus = (item) => {
                if (reviewType === 'high_rank') {
                    // High rank: 20 → 50 → 80 → 100 days
                    if (item.status === 'pending') return 'price_set_1';
                    if (item.status === 'price_set_1' && item.age_days >= 50) return 'price_set_2';
                    if (item.status === 'price_set_2' && item.age_days >= 80) return 'price_set_3';
                    if (item.status === 'price_set_3' && item.age_days >= 100) return 'price_set_4';
                    return item.status;
                }
                // High price: 45 → 70 → 100 days
                if (item.status === 'pending') return 'price_set_1';
                if (item.status === 'price_set_1' && item.age_days >= 70) return 'price_set_2';
                if (item.status === 'price_set_2' && item.age_days >= 100) return 'price_set_3';
                return item.status;
            };
            
            // Get items that are ready for review based on status filter
            const getReviewableStatuses = () => {
                if (statusFilter === 'pending') return ['pending'];
                if (statusFilter === 'price_set_1') return ['price_set_1'];
                if (statusFilter === 'price_set_2') return ['price_set_2'];
                if (statusFilter === 'price_set_3') return ['price_set_3'];
                if (statusFilter === 'exported') return ['exported'];
                return [statusFilter];
            };
            
            const loadReviews = useCallback(async () => {
                setLoading(true);
                const data = await supabase.query('aging_reviews', { 
                    filters: [
                        { col: 'review_type', val: `eq.${reviewType}` }
                    ],
                    order: 'age_days.desc'
                });
                setReviews(data || []);
                setLoading(false);
            }, [reviewType]);
            
            useEffect(() => { loadReviews(); }, [loadReviews]);
            
            // Count items by status
            const statusCounts = useMemo(() => {
                const counts = {};
                reviews.forEach(r => {
                    counts[r.status] = (counts[r.status] || 0) + 1;
                });
                return counts;
            }, [reviews]);
            
            // Filter reviews by status and other filters
            const filteredReviews = useMemo(() => {
                return reviews.filter(r => {
                    // Status filter
                    if (statusFilter !== 'all' && r.status !== statusFilter) return false;
                    
                    // Filter by age readiness for next review
                    if (reviewType === 'high_rank') {
                        if (statusFilter === 'price_set_1' && r.age_days < 50) return false;
                        if (statusFilter === 'price_set_2' && r.age_days < 80) return false;
                        if (statusFilter === 'price_set_3' && r.age_days < 100) return false;
                    } else {
                        // High price
                        if (statusFilter === 'price_set_1' && r.age_days < 70) return false;
                        if (statusFilter === 'price_set_2' && r.age_days < 100) return false;
                    }
                    
                    if (filters.ageBucket !== 'all' && r.age_bucket !== filters.ageBucket) return false;
                    if (filters.rankMin && r.sales_rank < parseInt(filters.rankMin)) return false;
                    if (filters.rankMax && r.sales_rank > parseInt(filters.rankMax)) return false;
                    if (filters.priceMin && r.current_price < parseFloat(filters.priceMin)) return false;
                    if (filters.priceMax && r.current_price > parseFloat(filters.priceMax)) return false;
                    return true;
                });
            }, [reviews, statusFilter, filters, reviewType]);
            
            const calculateReducedPrice = (item) => {
                // Use the last set price as base, or current_price if first time
                const basePrice = item.approved_price || item.current_price || 0;
                const floor = item.floor_price || 0;
                const reduction = profitReduction / 100;
                
                const referralFee = settings?.amazon_referral_fee || 0.15;
                const fixedFee = settings?.amazon_fixed_fee || 1.80;
                const shipping = 2.64;
                
                const currentNet = basePrice * (1 - referralFee) - fixedFee;
                const currentProfit = currentNet - shipping;
                
                const newProfit = currentProfit * (1 - reduction);
                const newNet = newProfit + shipping + fixedFee;
                const newPrice = newNet / (1 - referralFee);
                
                return Math.max(Math.round(newPrice * 100) / 100, floor);
            };
            
            const getNewPrice = (item) => {
                if (editedPrices[item.id] !== undefined && editedPrices[item.id] !== '') {
                    return parseFloat(editedPrices[item.id]) || 0;
                }
                return calculateReducedPrice(item);
            };
            
            const isPriceBelowFloor = (item) => {
                return getNewPrice(item) < (item.floor_price || 0);
            };
            
            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedIds.size === filteredReviews.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(filteredReviews.map(r => r.id)));
                }
            };
            
            const applyProfitReduction = () => {
                const newPrices = {};
                filteredReviews.forEach(item => {
                    newPrices[item.id] = calculateReducedPrice(item).toFixed(2);
                });
                setEditedPrices(prev => ({ ...prev, ...newPrices }));
            };
            
            const handleBatchApprove = async () => {
                const itemsToApprove = filteredReviews.filter(r => selectedIds.has(r.id));
                if (itemsToApprove.length === 0) {
                    alert('No items selected');
                    return;
                }
                
                const belowFloor = itemsToApprove.filter(r => isPriceBelowFloor(r));
                if (belowFloor.length > 0) {
                    alert(`${belowFloor.length} item(s) have prices below floor. Please fix before approving.`);
                    return;
                }
                
                const now = new Date().toISOString();
                
                for (const item of itemsToApprove) {
                    const price = getNewPrice(item);
                    const nextStatus = getNextStatus(item);
                    
                    // Build update object based on which price set we're recording
                    const updateData = {
                        approved_price: price,
                        profit_reduction_pct: profitReduction,
                        status: nextStatus,
                        reviewed_at: now
                    };
                    
                    // Record price history based on status transition
                    if (item.status === 'pending') {
                        updateData.price_set_1_price = price;
                        updateData.price_set_1_date = now;
                        updateData.price_set_1_reduction_pct = profitReduction;
                    } else if (item.status === 'price_set_1') {
                        updateData.price_set_2_price = price;
                        updateData.price_set_2_date = now;
                        updateData.price_set_2_reduction_pct = profitReduction;
                    } else if (item.status === 'price_set_2') {
                        updateData.price_set_3_price = price;
                        updateData.price_set_3_date = now;
                        updateData.price_set_3_reduction_pct = profitReduction;
                    } else if (item.status === 'price_set_3') {
                        updateData.price_set_4_price = price;
                        updateData.price_set_4_date = now;
                        updateData.price_set_4_reduction_pct = profitReduction;
                    }
                    
                    await supabase.update('aging_reviews', item.id, updateData);
                }
                
                setSelectedIds(new Set());
                setEditedPrices({});
                loadReviews();
                if (onRefresh) onRefresh();
                
                alert(`${itemsToApprove.length} items updated to ${getNextStatus(itemsToApprove[0])}`);
            };
            
            const handleExport = async () => {
                // Get all price_set items (not pending, not exported)
                const toExport = reviews.filter(r => 
                    r.status.startsWith('price_set') && r.approved_price
                );
                
                if (toExport.length === 0) {
                    alert('No items ready to export');
                    return;
                }
                
                const dateTag = exportDateTag();
                const csvLines = ['ASIN,MIN,MAX,TAGS'];
                toExport.forEach(item => {
                    // Use ="ASIN" format to preserve leading zeros in Excel
                    csvLines.push(`="${item.asin}",,${item.approved_price.toFixed(2)},${dateTag}_${reviewType.toUpperCase()}_${item.status.toUpperCase()}`);
                });
                
                const blob = new Blob([csvLines.join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `aging_export_${reviewType}_${dateTag}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                
                // Mark as exported
                for (const item of toExport) {
                    await supabase.update('aging_reviews', item.id, {
                        status: 'exported',
                        exported_at: new Date().toISOString()
                    });
                }
                
                loadReviews();
                alert(`Exported ${toExport.length} items`);
            };
            
            const readyToExportCount = reviews.filter(r => r.status.startsWith('price_set') && r.approved_price).length;
            
            // Get status label with color
            const getStatusBadge = (status) => {
                const colors = {
                    'pending': 'badge-yellow',
                    'price_set_1': 'badge-blue',
                    'price_set_2': 'badge-purple',
                    'price_set_3': 'badge-orange',
                    'price_set_4': 'badge-green',
                    'exported': 'badge-green'
                };
                const labels = {
                    'pending': 'Pending',
                    'price_set_1': 'Price 1',
                    'price_set_2': 'Price 2',
                    'price_set_3': 'Price 3',
                    'price_set_4': 'Price 4',
                    'exported': 'Exported'
                };
                return <span className={`badge ${colors[status] || 'badge-yellow'}`}>{labels[status] || status}</span>;
            };
            
            return (
                <div>
                    <div style={{marginBottom:16}}>
                        <h3 style={{margin:'0 0 4px',fontSize:16}}>{title}</h3>
                        <p style={{margin:0,fontSize:12,color:'var(--text-dim)'}}>{description}</p>
                    </div>
                    
                    {/* Status tabs */}
                    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                        {statusOptions.map(opt => (
                            <button 
                                key={opt.value}
                                className={statusFilter === opt.value ? 'btn-primary btn-small' : 'btn-secondary btn-small'}
                                onClick={() => { setStatusFilter(opt.value); setSelectedIds(new Set()); }}
                            >
                                {opt.label} ({statusCounts[opt.value] || 0})
                            </button>
                        ))}
                        <div style={{flex:1}}></div>
                        {readyToExportCount > 0 && (
                            <button className="btn-success btn-small" onClick={handleExport}>
                                📤 Export All Price Set ({readyToExportCount})
                            </button>
                        )}
                    </div>
                    
                    <div className="card" style={{overflow:'hidden'}}>
                        <div style={{padding:16,borderBottom:'1px solid var(--border)',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                            <select value={filters.ageBucket} onChange={e => setFilters({...filters, ageBucket: e.target.value})} style={{minWidth:100}}>
                                <option value="all">All Ages</option>
                                {ageBuckets.map(b => <option key={b} value={b}>{b} days</option>)}
                            </select>
                            
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                                <span style={{fontSize:11,color:'var(--text-dim)'}}>Rank:</span>
                                <input type="number" placeholder="Min" style={{width:80}} value={filters.rankMin} onChange={e => setFilters({...filters, rankMin: e.target.value})} />
                                <span>-</span>
                                <input type="number" placeholder="Max" style={{width:80}} value={filters.rankMax} onChange={e => setFilters({...filters, rankMax: e.target.value})} />
                            </div>
                            
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                                <span style={{fontSize:11,color:'var(--text-dim)'}}>Price:</span>
                                <input type="number" placeholder="Min" style={{width:70}} value={filters.priceMin} onChange={e => setFilters({...filters, priceMin: e.target.value})} />
                                <span>-</span>
                                <input type="number" placeholder="Max" style={{width:70}} value={filters.priceMax} onChange={e => setFilters({...filters, priceMax: e.target.value})} />
                            </div>
                            
                            <div style={{flex:1}}></div>
                            
                            <span style={{fontSize:12,color:'var(--text-dim)'}}>{filteredReviews.length} items</span>
                        </div>
                        
                        <div style={{padding:12,borderBottom:'1px solid var(--border)',background:'var(--bg-hover)',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <span style={{fontSize:12}}>Profit Reduction:</span>
                                <input type="number" min="0" max="100" style={{width:60}} value={profitReduction} onChange={e => setProfitReduction(parseInt(e.target.value) || 0)} />
                                <span style={{fontSize:12}}>%</span>
                                <button className="btn-small btn-primary" onClick={applyProfitReduction}>Apply to Page</button>
                            </div>
                            
                            <div style={{flex:1}}></div>
                            
                            <span style={{fontSize:13,color:'var(--text-dim)'}}>{selectedIds.size} selected</span>
                            
                            <button className="btn-success btn-small" onClick={handleBatchApprove} disabled={selectedIds.size === 0} style={{opacity: selectedIds.size === 0 ? 0.5 : 1}}>
                                ✓ Set Price ({selectedIds.size})
                            </button>
                        </div>
                        
                        <div style={{padding:8,borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <span style={{fontSize:12,color:'var(--text-dim)'}}>{filteredReviews.length} items</span>
                            <button className="btn-secondary btn-small" onClick={loadReviews}>↻ Refresh</button>
                        </div>
                        
                        <div style={{overflowX:'auto',maxHeight:'70vh',overflowY:'auto'}}>
                            {loading ? <div style={{padding:40,textAlign:'center',color:'var(--text-dim)'}}>Loading...</div> : (
                                <table>
                                    <thead style={{position:'sticky',top:0,background:'var(--bg-card)',zIndex:1}}>
                                        <tr>
                                            <th style={{width:40}}>
                                                <input type="checkbox" className="checkbox" checked={selectedIds.size === filteredReviews.length && filteredReviews.length > 0} onChange={toggleSelectAll} />
                                            </th>
                                            <th>ASIN</th>
                                            <th>Title</th>
                                            <th>Status</th>
                                            <th>Age</th>
                                            <th>Rank</th>
                                            <th>Original</th>
                                            <th>Last Price</th>
                                            <th>Floor</th>
                                            <th style={{width:100}}>New Price</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredReviews.map(r => {
                                            const isSelected = selectedIds.has(r.id);
                                            const hasEdited = editedPrices[r.id] !== undefined;
                                            const belowFloor = isPriceBelowFloor(r);
                                            const lastPrice = r.approved_price || r.current_price;
                                            return (
                                                <tr key={r.id} className={isSelected ? 'selected' : ''}>
                                                    <td><input type="checkbox" className="checkbox" checked={isSelected} onChange={() => toggleSelect(r.id)} /></td>
                                                    <td className="mono" style={{fontSize:11}}>
                                                        <a href={`http://lkdev.com/a.php?a=${r.asin}`} target="_blank" rel="noopener noreferrer" style={{color:'var(--blue)',textDecoration:'none'}}>{r.asin}</a>
                                                    </td>
                                                    <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{r.title || '—'}</td>
                                                    <td>{getStatusBadge(r.status)}</td>
                                                    <td><span className="badge badge-orange">{r.age_days}d</span></td>
                                                    <td className="mono" style={{fontSize:11}}>{r.sales_rank?.toLocaleString() || '—'}</td>
                                                    <td className="mono" style={{fontSize:12,color:'var(--text-dim)'}}>{fmt(r.current_price)}</td>
                                                    <td className="mono" style={{fontSize:12,color: r.approved_price ? 'var(--blue)' : 'var(--text-dim)'}}>{fmt(lastPrice)}</td>
                                                    <td className="mono" style={{fontSize:12,color:'var(--yellow)'}}>{fmt(r.floor_price)}</td>
                                                    <td>
                                                        <input 
                                                            type="number" 
                                                            step="0.01" 
                                                            className="mono"
                                                            style={{
                                                                width:'80px',
                                                                padding:'4px 8px',
                                                                fontSize:12,
                                                                textAlign:'right',
                                                                background: belowFloor ? 'rgba(239,68,68,0.1)' : hasEdited ? 'var(--bg-dark)' : 'var(--bg-hover)',
                                                                borderColor: belowFloor ? 'var(--red)' : hasEdited ? 'var(--blue)' : 'var(--border)'
                                                            }}
                                                            value={editedPrices[r.id] || ''}
                                                            placeholder={calculateReducedPrice(r).toFixed(2)}
                                                            onChange={e => setEditedPrices(prev => ({...prev, [r.id]: e.target.value}))}
                                                        />
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {filteredReviews.length === 0 && <tr><td colSpan={10} style={{textAlign:'center',padding:40,color:'var(--text-dim)'}}>No items found</td></tr>}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ========== AGING REVIEWS TAB ==========
        function AgingReviewsTab({ onRefresh, settings }) {
            const [agingItems, setAgingItems] = useState([]);
            const [category, setCategory] = useState('high_rank');
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [profitReduction, setProfitReduction] = useState(25);
            const [loading, setLoading] = useState(true);
            const [page, setPage] = useState(0);
            const [priceFilter, setPriceFilter] = useState({ min: '', max: '' });
            const [rankFilter, setRankFilter] = useState({ min: '', max: '' });
            const [ageFilter, setAgeFilter] = useState({ min: '', max: '' });
            const pageSize = 50;
            
            const loadAgingItems = useCallback(async () => {
                setLoading(true);
                const items = await supabase.query('aging_reviews', { 
                    order: 'age_days.desc',
                    filters: [{ col: 'status', val: 'eq.pending' }]
                });
                setAgingItems(items);
                setLoading(false);
            }, []);
            
            useEffect(() => { loadAgingItems(); }, [loadAgingItems]);
            useEffect(() => { setPage(0); setSelectedIds(new Set()); }, [category]);
            
            const filteredItems = useMemo(() => {
                let items = agingItems.filter(i => i.category === category);
                
                // Apply filters
                if (priceFilter.min) items = items.filter(i => i.current_price >= parseFloat(priceFilter.min));
                if (priceFilter.max) items = items.filter(i => i.current_price <= parseFloat(priceFilter.max));
                if (rankFilter.min) items = items.filter(i => i.sales_rank >= parseInt(rankFilter.min));
                if (rankFilter.max) items = items.filter(i => i.sales_rank <= parseInt(rankFilter.max));
                if (ageFilter.min) items = items.filter(i => i.age_days >= parseInt(ageFilter.min));
                if (ageFilter.max) items = items.filter(i => i.age_days <= parseInt(ageFilter.max));
                
                return items;
            }, [agingItems, category, priceFilter, rankFilter, ageFilter]);
            
            const categoryCounts = useMemo(() => ({
                high_rank: agingItems.filter(i => i.category === 'high_rank').length,
                high_price_45: agingItems.filter(i => i.category === 'high_price_45').length,
                high_price_70: agingItems.filter(i => i.category === 'high_price_70').length,
                high_price_100: agingItems.filter(i => i.category === 'high_price_100').length,
            }), [agingItems]);
            
            const totalPages = Math.ceil(filteredItems.length / pageSize);
            const pagedItems = filteredItems.slice(page * pageSize, (page + 1) * pageSize);
            
            const calculateNewPrice = (item, reductionPct) => {
                const minProfit = settings?.min_profit || 2.50;
                const referralFee = settings?.amazon_referral_fee || 0.15;
                const fixedFee = settings?.amazon_fixed_fee || 1.80;
                const shippingCost = settings?.shipping_brackets?.[0]?.cost || 2.64;
                
                // Calculate floor price
                const minNet = fixedFee + shippingCost + (minProfit * (1 - reductionPct/100));
                const floorPrice = minNet / (1 - referralFee);
                
                // Reduce current price by the reduction percentage
                const reducedPrice = item.current_price * (1 - reductionPct/100);
                
                // Return the higher of reduced price or floor
                return Math.max(reducedPrice, floorPrice);
            };
            
            const toggleSelect = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };
            
            const toggleSelectAll = () => {
                if (selectedIds.size === pagedItems.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(pagedItems.map(i => i.id)));
                }
            };
            
            const handleBatchApprove = async () => {
                const itemsToApprove = pagedItems.filter(i => selectedIds.has(i.id));
                if (itemsToApprove.length === 0) {
                    alert('No items selected');
                    return;
                }
                
                for (const item of itemsToApprove) {
                    const newPrice = calculateNewPrice(item, profitReduction);
                    await supabase.update('aging_reviews', item.id, {
                        suggested_price: newPrice,
                        approved_price: newPrice,
                        profit_reduction_pct: profitReduction,
                        status: 'approved',
                        approved_at: new Date().toISOString()
                    });
                }
                
                setSelectedIds(new Set());
                loadAgingItems();
                alert(`${itemsToApprove.length} items approved with ${profitReduction}% profit reduction`);
            };
            
            const categoryLabels = {
                'high_rank': '📈 High Rank (>1.8M, >20 days)',
                'high_price_45': '💰 High Price 45+ days',
                'high_price_70': '💰 High Price 70+ days',
                'high_price_100': '💰 High Price 100+ days'
            };
            
            return (
                <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                        <h3 style={{margin:0,fontSize:16}}>📅 Aging Price Reviews</h3>
                        <button className="btn-secondary" onClick={() => { loadAgingItems(); onRefresh(); }}>↻ Refresh</button>
                    </div>
                    
                    {/* Category Tabs */}
                    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                        {Object.entries(categoryLabels).map(([key, label]) => (
                            <button 
                                key={key}
                                className={category === key ? 'btn-primary' : 'btn-secondary'}
                                onClick={() => setCategory(key)}
                                style={{fontSize:12}}
                            >
                                {label} ({categoryCounts[key]})
                            </button>
                        ))}
                    </div>
                    
                    {/* Filters */}
                    <div className="card" style={{padding:16,marginBottom:16}}>
                        <div style={{display:'flex',gap:24,flexWrap:'wrap',alignItems:'flex-end'}}>
                            <div>
                                <label style={{display:'block',fontSize:11,color:'var(--text-dim)',marginBottom:4}}>Price Range ($)</label>
                                <div style={{display:'flex',gap:4,alignItems:'center'}}>
                                    <input type="number" placeholder="Min" style={{width:70,fontSize:12}} value={priceFilter.min} onChange={e => setPriceFilter(p => ({...p, min: e.target.value}))} />
                                    <span>-</span>
                                    <input type="number" placeholder="Max" style={{width:70,fontSize:12}} value={priceFilter.max} onChange={e => setPriceFilter(p => ({...p, max: e.target.value}))} />
                                </div>
                            </div>
                            <div>
                                <label style={{display:'block',fontSize:11,color:'var(--text-dim)',marginBottom:4}}>Rank Range</label>
                                <div style={{display:'flex',gap:4,alignItems:'center'}}>
                                    <input type="number" placeholder="Min" style={{width:90,fontSize:12}} value={rankFilter.min} onChange={e => setRankFilter(p => ({...p, min: e.target.value}))} />
                                    <span>-</span>
                                    <input type="number" placeholder="Max" style={{width:90,fontSize:12}} value={rankFilter.max} onChange={e => setRankFilter(p => ({...p, max: e.target.value}))} />
                                </div>
                            </div>
                            <div>
                                <label style={{display:'block',fontSize:11,color:'var(--text-dim)',marginBottom:4}}>Age (days)</label>
                                <div style={{display:'flex',gap:4,alignItems:'center'}}>
                                    <input type="number" placeholder="Min" style={{width:60,fontSize:12}} value={ageFilter.min} onChange={e => setAgeFilter(p => ({...p, min: e.target.value}))} />
                                    <span>-</span>
                                    <input type="number" placeholder="Max" style={{width:60,fontSize:12}} value={ageFilter.max} onChange={e => setAgeFilter(p => ({...p, max: e.target.value}))} />
                                </div>
                            </div>
                            <div style={{borderLeft:'1px solid var(--border)',paddingLeft:24}}>
                                <label style={{display:'block',fontSize:11,color:'var(--text-dim)',marginBottom:4}}>Profit Reduction %</label>
                                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                    <input type="number" min="0" max="100" style={{width:60,fontSize:12}} value={profitReduction} onChange={e => setProfitReduction(parseInt(e.target.value) || 0)} />
                                    <span style={{fontSize:12,color:'var(--text-dim)'}}>%</span>
                                </div>
                            </div>
                            <div>
                                <span style={{fontSize:13,color:'var(--text-dim)'}}>{selectedIds.size} selected</span>
                            </div>
                            <button 
                                className="btn-success" 
                                onClick={handleBatchApprove}
                                disabled={selectedIds.size === 0}
                                style={{opacity: selectedIds.size === 0 ? 0.5 : 1}}
                            >
                                ✓ Approve Selected ({selectedIds.size})
                            </button>

        // ========== SALES TRACKING TAB ==========
        function SalesTrackingTab({ onRefresh }) {
            const [effectiveness, setEffectiveness] = useState([]);
            const [pendingSales, setPendingSales] = useState([]);
            const [loading, setLoading] = useState(true);
            
            const loadData = useCallback(async () => {
                setLoading(true);
                
                // Load export effectiveness view
                const effData = await supabase.query('v_export_effectiveness', { order: 'export_date.desc' });
                setEffectiveness(effData || []);
                
                // Load pending sales view
                const pendingData = await supabase.query('v_pending_sales', { order: 'exported_at.asc' });
                setPendingSales(pendingData || []);
                
                setLoading(false);
            }, []);
            
            useEffect(() => { loadData(); }, [loadData]);
            
            const handleMatchSales = async () => {
                try {
                    const result = await supabase.rpc('match_sales_to_exports');
                    alert(`Matched ${result?.length || 0} sales to exports`);
                    loadData();
                    if (onRefresh) onRefresh();
                } catch (err) {
                    console.error('Match error:', err);
                    alert('Match failed - make sure you have the match_sales_to_exports function');
                }
            };
            
            const formatDate = (dateStr) => {
                if (!dateStr) return '—';
                return new Date(dateStr).toLocaleDateString();
            };
            
            const totalSold = effectiveness.reduce((sum, e) => sum + (e.items_sold || 0), 0);
            const totalExported = effectiveness.reduce((sum, e) => sum + (e.items_tracked || 0), 0);
            const overallSellThrough = totalExported > 0 ? Math.round((totalSold / totalExported) * 100) : 0;
            const avgDaysOverall = effectiveness.filter(e => e.avg_days_to_sell).length > 0
                ? Math.round(effectiveness.reduce((sum, e) => sum + (e.avg_days_to_sell || 0), 0) / effectiveness.filter(e => e.avg_days_to_sell).length)
                : null;
            
            return (
                <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                        <h3 style={{margin:0,fontSize:16}}>📊 Sales Tracking & Effectiveness</h3>
                        <div style={{display:'flex',gap:8}}>
                            <button className="btn-secondary btn-small" onClick={loadData}>↻ Refresh</button>
                            <button className="btn-primary btn-small" onClick={handleMatchSales}>🔄 Match Sales Data</button>
                        </div>
                    </div>
                    
                    {/* Summary Stats */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>

                            <div className="stat-value" style={{color:'var(--blue)'}}>{totalExported}</div>
                            <div className="stat-label">Items Exported</div>
                        </div>
                        <div className="card stat-card">
                            <div className="stat-value" style={{color:'var(--green)'}}>{totalSold}</div>
                            <div className="stat-label">Items Sold</div>
                        </div>
                        <div className="card stat-card">
                            <div className="stat-value" style={{color:'var(--purple)'}}>{overallSellThrough}%</div>
                            <div className="stat-label">Sell-Through Rate</div>
                        </div>
                        <div className="card stat-card">
                            <div className="stat-value" style={{color:'var(--orange)'}}>{avgDaysOverall || '—'}</div>
                            <div className="stat-label">Avg Days to Sell</div>
                        </div>
                    </div>
                    
                    {loading ? (
                        <div style={{textAlign:'center',padding:40,color:'var(--text-dim)'}}>Loading...</div>
                    ) : (
                        <>
                            {/* Export Effectiveness by Batch */}
                            <h4 style={{margin:'0 0 12px',fontSize:14}}>Export Batches</h4>
                            <div className="card" style={{overflow:'hidden',marginBottom:24}}>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Export Date</th>
                                            <th>Items</th>
                                            <th>Sold</th>
                                            <th>Sell-Through</th>
                                            <th>Avg Days</th>
                                            <th>Revenue</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {effectiveness.map(e => (
                                            <tr key={e.export_id}>
                                                <td style={{fontSize:12}}>{formatDate(e.export_date)}</td>

                                                <td className="mono" style={{color:'var(--green)'}}>{e.items_sold || 0}</td>
                                                <td>
                                                    <span className={`badge ${e.sell_through_pct > 50 ? 'badge-green' : e.sell_through_pct > 25 ? 'badge-yellow' : 'badge-red'}`}>
                                                        {e.sell_through_pct || 0}%

                                            <tr>

                                                <th>Title</th>
                                                <th>Export Price</th>

                                            )}

        function PricingLogicTab({ settings }) {
            const minProfit = settings?.min_profit || 2.50;
            const referralFee = settings?.amazon_referral_fee || 0.15;
            const fixedFee = settings?.amazon_fixed_fee || 1.80;
            const shippingCost = settings?.shipping_brackets?.[0]?.cost || 2.64;
            const floor = ((fixedFee + shippingCost + minProfit) / (1 - referralFee)).toFixed(2);
            
            return (
                <div>
                    <h3 style={{margin:'0 0 20px',fontSize:18}}>📖 Pricing Logic Documentation</h3>
                    
                    <div className="card" style={{padding:20,marginBottom:20}}>
                        <h4 style={{margin:'0 0 12px',color:'var(--blue)'}}>🎯 Overview</h4>
                        <p style={{margin:'0 0 12px',lineHeight:1.6}}>
                            The pricing system uses Keepa data to calculate suggested prices for inventory items. 
                            The key innovation is using <strong>Out of Stock percentage (OOS%)</strong> to determine 
                            whether to trust average prices or use lowest prices.
                        </p>
                    </div>

                    <div className="card" style={{padding:20,marginBottom:20}}>
                        <h4 style={{margin:'0 0 12px',color:'var(--yellow)'}}>💰 Floor Price Calculation</h4>
                        <p style={{margin:'0 0 12px',lineHeight:1.6}}>The floor price ensures minimum profit on every sale:</p>
                        <div style={{background:'var(--bg-dark)',padding:16,borderRadius:8,fontFamily:'monospace',fontSize:13,marginBottom:12}}>
                            Floor = (Fixed Fee + Shipping + Min Profit) ÷ (1 - Referral Fee)<br/>
                            Floor = (${fixedFee} + ${shippingCost} + ${minProfit}) ÷ (1 - {referralFee})<br/>
                            <strong style={{color:'var(--green)'}}>Floor = ${floor}</strong>
                        </div>
                        <p style={{margin:0,fontSize:13,color:'var(--text-dim)'}}>
                            The suggested price will <strong>never</strong> go below the floor price.
                        </p>
                    </div>

                    <div className="card" style={{padding:20,marginBottom:20}}>
                        <h4 style={{margin:'0 0 12px',color:'var(--orange)'}}>📊 OOS-Based Pricing Strategy</h4>
                        <p style={{margin:'0 0 16px',lineHeight:1.6}}>
                            The 90-day Out of Stock percentage tells us how reliable the average prices are:
                        </p>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                            <div style={{background:'var(--bg-dark)',padding:16,borderRadius:8}}>
                                <div style={{fontWeight:600,marginBottom:8,color:'var(--orange)'}}>OOS ≥ 50% → Use LOWEST prices</div>
                                <p style={{margin:0,fontSize:13,lineHeight:1.5}}>
                                    Item is often out of stock, so average prices are unreliable 
                                    (based on limited sales data). Price conservatively using lowest prices.
                                </p>
                                <div style={{marginTop:12,fontSize:12,color:'var(--text-dim)'}}>

                                <div style={{fontWeight:600,marginBottom:8,color:'var(--green)'}}>OOS &lt; 50% → Use AVERAGE prices</div>
                                <p style={{margin:0,fontSize:13,lineHeight:1.5}}>
                                    Item has good availability, so average prices reflect true market value.
                                    Use 365-day average for pricing.
                                </p>
                                <div style={{marginTop:12,fontSize:12,color:'var(--text-dim)'}}>
                                    Priority: avg_used_365 → lowest_used_365 → lowest_used+$3.99

                    </div>

                        <p style={{margin:'0 0 12px',lineHeight:1.6}}>
                            Regardless of the calculated price, these caps are always applied:

                                <tr style={{background:'var(--bg-dark)'}}>
                                    <th style={{padding:12,textAlign:'left'}}>Cap Type</th>
                                    <th style={{padding:12,textAlign:'left'}}>Formula</th>
                                    <th style={{padding:12,textAlign:'left'}}>Example</th>
                                </tr>
                            </thead>

                                <tr>
                                    <td style={{padding:12,borderTop:'1px solid var(--border)'}}>Lowest Used Cap</td>
                                    <td style={{padding:12,borderTop:'1px solid var(--border)',fontFamily:'monospace'}}>MIN(lowest×3, lowest+$10) + $3.99 shipping</td>

                                </tr>

                        </table>

                            Items are sent to supervisor review when:

                        <ul style={{margin:0,paddingLeft:20,lineHeight:1.8}}>
                            <li>No <code>lowest_used</code> AND no <code>lowest_new</code> AND no <code>lowest_used_365</code> AND no <code>lowest_buy_box_used</code></li>
