                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>lowest_used</td><td>All-time lowest used price</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>lowest_used_365</td><td>365-day lowest used price</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>lowest_new</td><td>All-time lowest new price</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>lowest_buy_box_used</td><td>Lowest buy box used price</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>avg_used_365</td><td>365-day average used price</td></tr>
                                    </tbody>
                                </table>
                            </div>
                            <div>
                                <div style={{fontWeight:600,marginBottom:8}}>Other Fields</div>
                                <table style={{width:'100%',fontSize:12}}>
                                    <tbody>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>oos_90_used</td><td>90-day out of stock % (key metric!)</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>sales_rank</td><td>Current Amazon sales rank</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>avg_sales_rank</td><td>365-day average sales rank</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>offer_count_used</td><td>Current used offer count</td></tr>
                                        <tr><td style={{padding:'4px 0',color:'var(--text-dim)'}}>offer_count_new</td><td>Current new offer count</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [tab, setTab] = useState('review');
            const [fringeFilter, setFringeFilter] = useState('has_suggested');
            const [showConnection, setShowConnection] = useState(!CONFIG.SUPABASE_URL);
            const [showFlagModal, setShowFlagModal] = useState(false);
            const [flagAsin, setFlagAsin] = useState(null);
            const [approveItem, setApproveItem] = useState(null);
            const [loading, setLoading] = useState(true);
            const [fringeCases, setFringeCases] = useState([]);
            const [reviews, setReviews] = useState([]);
            const [settings, setSettings] = useState({ shipping_brackets: [], min_profit: 2.50, amazon_referral_fee: 0.15, amazon_fixed_fee: 1.80 });
            const [stats, setStats] = useState({});

            const loadData = useCallback(async () => {
                if (!CONFIG.SUPABASE_URL) return;
                setLoading(true);
                try {
                    const settingsData = await supabase.query('dashboard_settings', { limit: 1 });
                    if (settingsData.length > 0) setSettings(settingsData[0]);
                    const cases = await supabase.query('fringe_cases', { select: '*, inventory(title, current_list_price, asin)', order: 'created_at.desc', filters: [{ col: 'status', val: 'eq.pending' }] });
                    const snapshots = await supabase.query('price_snapshots', { select: '*', order: 'snapshot_date.desc' });
                    const snapshotMap = {}; snapshots.forEach(s => { if (!snapshotMap[s.asin]) snapshotMap[s.asin] = s; });
                    // Merge snapshots but keep fringe_cases id
                    const enrichedCases = cases.map(c => {
                        const snapshot = snapshotMap[c.asin] || {};
                        // Remove snapshot id so we keep fringe_cases id
                        const { id: snapshotId, ...snapshotData } = snapshot;
                        return { ...snapshotData, ...c };
                    });
                    const reviewsData = await supabase.query('manual_reviews', { order: 'created_at.desc' });
                    const exportItemsData = await supabase.query('price_export_items', { select: 'id', order: 'exported_at.desc' });
                    setFringeCases(enrichedCases);
                    setReviews(reviewsData);
                    setStats({ hasSuggested: enrichedCases.filter(c => c.suggested_price != null && !c.ready_to_export).length, needsKeepa: enrichedCases.filter(c => c.suggested_price == null).length, readyToExport: enrichedCases.filter(c => c.ready_to_export).length, supervisorQueue: reviewsData.filter(r => r.status === 'pending').length, totalExported: exportItemsData.length });
                } catch (err) { console.error('Error loading data:', err); }
                setLoading(false);
            }, []);

            useEffect(() => { loadData(); }, [loadData]);

            const handleSaveSettings = async (newSettings) => { await supabase.update('dashboard_settings', newSettings.id, { shipping_brackets: newSettings.shipping_brackets, min_profit: newSettings.min_profit, amazon_referral_fee: newSettings.amazon_referral_fee, amazon_fixed_fee: newSettings.amazon_fixed_fee, updated_at: new Date().toISOString() }); setSettings(newSettings); };
            const handleApprovePrice = async (id, price, notes, readyToExport) => { 
                console.log('Approving:', { id, price, notes, readyToExport });
                const result = await supabase.update('fringe_cases', id, { approved_price: price, approval_notes: notes, ready_to_export: readyToExport, approved_at: new Date().toISOString() }); 
                console.log('Update result:', result);
                setApproveItem(null); 
                loadData(); 
            };
            const handleExport = async (items) => {
                try {
                    const [exportRecord] = await supabase.insert('price_exports', { item_count: items.length, exported_by: 'dashboard' });
                    if (!exportRecord) { alert('Failed to create export'); return; }
                    await supabase.insert('price_export_items', items.map(item => ({ export_id: exportRecord.id, asin: item.asin, old_price: item.old_price, new_price: item.new_price, source: 'fringe_review' })));
                    for (const item of items) { await supabase.update('fringe_cases', item.id, { status: 'resolved', resolved_at: new Date().toISOString(), resolution_notes: `Exported @ $${item.new_price}` }); }
                    const dateTag = exportDateTag();
                    const csvLines = ['ASIN,MIN,MAX,TAGS']; items.forEach(item => { csvLines.push(`="${item.asin}",,${item.new_price.toFixed(2)},${dateTag}`); });
                    const blob = new Blob([csvLines.join('\n')], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `price_export_${dateTag}.csv`; a.click(); URL.revokeObjectURL(url);
                    loadData();
                } catch (err) { console.error('Export error:', err); alert('Export failed: ' + err.message); }
            };
            const handleFlagForReview = async (data) => { await supabase.insert('manual_reviews', { asin: data.asin, reason: data.reason, details: data.details, flagged_by: data.flagged_by, status: 'pending' }); loadData(); };
            const handleResolveReview = async (id, status, notes, reviewedBy, exportPrice) => {
                await supabase.update('manual_reviews', id, { status, review_notes: notes, reviewed_by: reviewedBy, reviewed_at: new Date().toISOString() });
                if (exportPrice && status === 'reviewed') {
                    const review = reviews.find(r => r.id === id);
                    if (review) {
                        const existingCases = await supabase.query('fringe_cases', { filters: [{ col: 'asin', val: `eq.${review.asin}` }] });
                        if (existingCases.length > 0) { await supabase.update('fringe_cases', existingCases[0].id, { approved_price: exportPrice, ready_to_export: true, approved_at: new Date().toISOString(), approval_notes: notes }); }
                    }
                }
                loadData();
            };
            const openFlagModal = (asin) => { setFlagAsin(asin); setShowFlagModal(true); };

            return (
                <div style={{minHeight:'100vh'}}>
                    <header style={{background:'var(--bg-card)',borderBottom:'1px solid var(--border)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div style={{display:'flex',alignItems:'center',gap:12}}><span style={{fontSize:22}}>📊</span><h1 style={{margin:0,fontSize:18,fontWeight:600}}>Pricing Dashboard</h1></div>
                        <div style={{display:'flex',gap:10}}><button className="btn-secondary btn-small" onClick={loadData}>↻ Refresh</button><button className="btn-secondary btn-small" onClick={() => setShowConnection(true)}>🔌</button></div>
                    </header>
                    <main style={{padding:24,maxWidth:1400,margin:'0 auto'}}>
                        {!CONFIG.SUPABASE_URL ? (
                            <div className="card" style={{padding:40,textAlign:'center'}}><h2 style={{marginBottom:12}}>Welcome to Pricing Dashboard</h2><p style={{color:'var(--text-dim)',marginBottom:20}}>Connect your Supabase database to get started.</p><button className="btn-primary" onClick={() => setShowConnection(true)}>Configure Connection</button></div>
                        ) : (
                            <>
                                <StatsRow stats={stats} />
                                <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:20,flexWrap:'wrap'}}>
                                    <div className={`tab ${tab === 'review' ? 'active' : ''}`} onClick={() => setTab('review')}>📋 Fringe</div>
                                    <div className={`tab ${tab === 'high_rank' ? 'active' : ''}`} onClick={() => setTab('high_rank')}>📈 High Rank</div>
                                    <div className={`tab ${tab === 'high_price' ? 'active' : ''}`} onClick={() => setTab('high_price')}>💰 High Price</div>
                                    <div className={`tab ${tab === 'export' ? 'active' : ''}`} onClick={() => setTab('export')}>🚀 Export{stats.readyToExport > 0 && <span className="badge badge-green" style={{marginLeft:8}}>{stats.readyToExport}</span>}</div>
                                    <div className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>📦 History</div>
                                    <div className={`tab ${tab === 'sales' ? 'active' : ''}`} onClick={() => setTab('sales')}>📊 Sales</div>
                                    <div className={`tab ${tab === 'supervisor' ? 'active' : ''}`} onClick={() => setTab('supervisor')}>👔 Supervisor{stats.supervisorQueue > 0 && <span className="badge badge-purple" style={{marginLeft:8}}>{stats.supervisorQueue}</span>}</div>
                                    <div className={`tab ${tab === 'logic' ? 'active' : ''}`} onClick={() => setTab('logic')}>📖 Logic</div>
                                    <div className={`tab ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>⚙️ Settings</div>
                                </div>
                                {loading ? <div style={{textAlign:'center',padding:60,color:'var(--text-dim)'}}>Loading...</div> : (
                                    <>
                                        {tab === 'review' && <FringeCasesTable cases={fringeCases} filter={fringeFilter} onFilterChange={setFringeFilter} onApprove={handleApprovePrice} onFlag={openFlagModal} onRefresh={loadData} settings={settings} />}
                                        {tab === 'high_rank' && <AgingReviewTab reviewType="high_rank" settings={settings} onRefresh={loadData} />}
                                        {tab === 'high_price' && <AgingReviewTab reviewType="high_price" settings={settings} onRefresh={loadData} />}
                                        {tab === 'export' && <ExportTab cases={fringeCases} onExport={handleExport} onRefresh={loadData} />}
                                        {tab === 'history' && <ExportHistoryTab onRefresh={loadData} />}
                                        {tab === 'sales' && <SalesTrackingTab onRefresh={loadData} />}
                                        {tab === 'supervisor' && <SupervisorReviewTab reviews={reviews} onResolve={handleResolveReview} onRefresh={loadData} settings={settings} />}
                                        {tab === 'logic' && <PricingLogicTab settings={settings} />}
                                        {tab === 'settings' && <SettingsTab settings={settings} onSave={handleSaveSettings} />}
                                    </>
                                )}
                            </>
                        )}
                    </main>
                    <ConnectionModal isOpen={showConnection} onClose={() => setShowConnection(false)} />
                    <FlagForReviewModal isOpen={showFlagModal} onClose={() => setShowFlagModal(false)} asin={flagAsin} onSubmit={handleFlagForReview} />
                    <ApprovePriceModal isOpen={!!approveItem} item={approveItem} onClose={() => setApproveItem(null)} onApprove={handleApprovePrice} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
